{% extends "base.html" %}

{% block main %}
<div class="p-5 mb-4 bg-light rounded-3 border">
  <div class="container-fluid py-5">
    <h1 class="display-5 fw-bold">Book a New Appointment</h1>
    <p>Enter a title, date/time, and optional notes below.</p>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <form method="post" action="{{ url_for('book_appointment') }}">
          <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" placeholder="What is this appointment about?" required>
          </div>
          <div class="mb-3">
            <label for="when" class="form-label">Date &amp; Time</label>
            <input type="datetime-local" class="form-control" id="when" name="when" required>
          </div>
          <div class="mb-3">
            <label for="notes" class="form-label">Notes (optional)</label>
            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit</button>
          <a class="btn btn-link" href="{{ url_for('manage_appointments') }}">Back to Manage Appointments</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
