{% extends 'base.html' %}

{% block main %}
<form class="form-login m-auto" method="post">
  <input type="hidden" name="next" value="{{ request.args.get('next') or '' }}">
  <h2>Please sign in</h2>
  <div class="form-floating">
    {{ form.username(class='form-control', placeholder="Username or Email") }}
    <label for="username">Username or Email</label>
  </div>
  <div class="form-floating">
    {{ form.password(class='form-control', placeholder="Enter your password") }}
    {{ form.password.label() }}
  </div>
  <button class="btn btn-lg btn-primary w-100 mt-3" type="submit">Sign in</button>
  <p class="mt-3 text-center">Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
</form>
{% endblock %}
